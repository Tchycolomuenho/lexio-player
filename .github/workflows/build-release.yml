name: Build & Release Lexio Player

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 PyQtWebEngine python-vlc

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller LexioStudyPlayer.spec --noconfirm

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Build installer
        run: |
          iscc installer.iss

      - name: Get version
        id: version
        shell: powershell
        run: |
          # Extract single version number from "Lexio Study Player v3.1"
          $content = Get-Content lexio_player.py -First 3 | Out-String
          $match = [regex]::Match($content, 'v(\d+\.\d+)')
          $ver = $match.Groups[1].Value
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "version=$ver"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_PAT }}
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Lexio Study Player v${{ steps.version.outputs.VERSION }}
          body: |
            Build automático do Lexio Study Player.
            
            ## O que foi alterado
            - Veja o histórico de commits para detalhes.
          files: |
            installer/LexioStudyPlayer-*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
